<!doctype html>
<html lang="en">
  <head>
    <title>Contact - Zohra Malek Meslem</title>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"

    /></noscript>
    <style>
      /* Contact Page Specific Styles */
      .contact-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 40px;
        margin-top: 40px;
      }

      .contact-form-section,
      .contact-info-section {
        background: var(--card-bg);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--card-border);
        border-radius: var(--border-radius-lg);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }

      .contact-form-section::before,
      .contact-info-section::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: var(--primary-gradient);
      }

      .contact-form-section h2,
      .contact-info-section h2 {
        font-family: "Poppins", sans-serif;
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 30px;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .contact-form-section h2 i,
      .contact-info-section h2 i {
        color: var(--accent-color);
      }

      /* Form Styles */
      .form-group {
        margin-bottom: 25px;
      }

      .form-group label {
        display: block;
        margin-bottom: 10px;
        font-weight: 500;
        color: var(--text-secondary);
        font-size: 0.95rem;
      }

      .form-group label.required::after {
        content: " *";
        color: #f5576c;
      }

      .form-group input,
      .form-group textarea {
        width: 100%;
        padding: 14px 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--card-border);
        border-radius: var(--border-radius-md);
        color: var(--text-primary);
        font-size: 1rem;
        font-family: inherit;
        transition: var(--transition-medium);
      }

      .form-group input:focus,
      .form-group textarea:focus {
        outline: none;
        border-color: var(--accent-color);
        background: rgba(255, 255, 255, 0.08);
        box-shadow: 0 0 20px rgba(102, 126, 234, 0.2);
      }

      .form-group input::placeholder,
      .form-group textarea::placeholder {
        color: var(--text-muted);
      }

      .form-group textarea {
        min-height: 150px;
        resize: vertical;
      }

      .submit-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        width: 100%;
        padding: 16px 32px;
        background: var(--primary-gradient);
        color: var(--text-primary);
        border: none;
        border-radius: var(--border-radius-md);
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: var(--transition-medium);
      }

      .submit-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 15px 40px var(--shadow-color);
      }

      /* Contact Info Cards */
      .contact-info-list {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      .contact-info-item {
        display: flex;
        align-items: flex-start;
        gap: 20px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.03);
        border-radius: var(--border-radius-md);
        border: 1px solid rgba(255, 255, 255, 0.05);
        transition: var(--transition-medium);
      }

      .contact-info-item:hover {
        border-color: rgba(102, 126, 234, 0.3);
        background: rgba(255, 255, 255, 0.05);
        transform: translateX(5px);
      }

      .contact-info-icon {
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--primary-gradient);
        border-radius: var(--border-radius-md);
        font-size: 1.3rem;
        color: var(--text-primary);
        flex-shrink: 0;
      }

      .contact-info-content h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 5px;
        color: var(--text-primary);
      }

      .contact-info-content p,
      .contact-info-content a {
        color: var(--text-secondary);
        font-size: 0.95rem;
        text-decoration: none;
        transition: var(--transition-fast);
      }

      .contact-info-content a:hover {
        color: var(--accent-color);
      }

      /* Social Links */
      .social-section {
        margin-top: 30px;
        padding-top: 30px;
        border-top: 1px solid var(--card-border);
      }

      .social-section h3 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 20px;
        color: var(--text-secondary);
      }

      .social-links {
        display: flex;
        gap: 15px;
      }

      .social-link {
        width: 50px;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--card-bg);
        border: 1px solid var(--card-border);
        border-radius: 50%;
        color: var(--text-secondary);
        font-size: 1.3rem;
        text-decoration: none;
        transition: var(--transition-medium);
      }

      .social-link:hover {
        background: var(--primary-gradient);
        color: var(--text-primary);
        border-color: transparent;
        transform: translateY(-5px);
        box-shadow: 0 15px 40px var(--shadow-color);
      }

      /* Page Header */
      .page-header {
        text-align: center;
        padding: 60px 20px;
      }

      .page-header h1 {
        font-family: "Poppins", sans-serif;
        font-size: 3rem;
        font-weight: 700;
        background: var(--primary-gradient);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
      }

      .page-header p {
        color: var(--text-secondary);
        font-size: 1.1rem;
      }

      /* Map placeholder */
      .map-container {
        margin-top: 30px;
        border-radius: var(--border-radius-md);
        overflow: hidden;
        height: 200px;
        background: rgba(255, 255, 255, 0.03);
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--card-border);
      }

      .map-container iframe {
        width: 100%;
        height: 100%;
        border: none;
        filter: grayscale(100%) invert(100%) contrast(90%);
      }

      /* Responsive */
      @media screen and (max-width: 900px) {
        .contact-container {
          grid-template-columns: 1fr;
        }
      }

      @media screen and (max-width: 480px) {
        .contact-form-section,
        .contact-info-section {
          padding: 25px;
        }

        .contact-info-item {
          flex-direction: column;
          text-align: center;
        }

        .social-links {
          justify-content: center;
        }
      }
    </style>
  </head>

        <div class="page-header">
          <h1><i class="fas fa-envelope"></i> Contact Me</h1>

        <!-- Contact Container -->
        <div class="contact-container">
          <!-- Contact Form -->
          <div class="contact-form-section">
            <h2><i class="fas fa-paper-plane"></i> Send a Message</h2>
            <form method="post" action="https://formspree.io/f/myzgynyr">
              <div class="form-group">

                  id="message"

            <div class="contact-info-list">

                </div>
                <div class="contact-info-content">

                </div>
              </div>

              <div class="contact-info-item">
                <div class="contact-info-icon">
                  <i class="fas fa-phone"></i>
                </div>
                <div class="contact-info-content">
                  <h3>Phone</h3>
                  <a href="tel:+33751052625">(+33) 7 51 05 26 25</a>
                </div>
              </div>

              <div class="contact-info-item">

                  <i class="fas fa-envelope"></i>
                </div>
                <div class="contact-info-content">
                  <h3>Email</h3>
                  <a href="mailto:malakemeslem@gmail.com"
                    >malakemeslem@gmail.com</a
                  >
                </div>
              </div>
            </div>

            <!-- Social Links -->
            <div class="social-section">
              <h3>Connect with me</h3>
              <div class="social-links">
                <a
                  href="https://www.linkedin.com/in/malek-meslem-687145347/"

            <!-- Map -->
